name: Network Operator Docker and Helm CI

on:
  push:
    branches:
    - "master"
    - "feature/ghci"  # TODO: remove after testing
    - "v[0-9]+.[0-9]+.x"
    tags:
    - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  REGISTRY: nvcr.io/nvstaging/mellanox  # for docker
  IMAGE_NAME: network-operator-mzeevi-test  # TODO: remove suffix after testing
  VALID_TAG_REGEX: 'v[0-9]+\.[0-9]+\.[0-9]+(-(beta|rc)\.[0-9]+)?'
  NGC_REPO: nvstaging/mellanox/network-operator-mzeevi-test  # for helm  # TODO: remove suffix after testing

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Determine docker tags (from git branch)
      if: github.ref_type == 'branch'
      run: |
        git_sha=$(git rev-parse --short HEAD)  # short git commit hash
        latest=${{ github.ref_name == 'master' && 'latest' || '' }}  # 'latest', if branch is master
        echo DOCKER_TAGS=""$git_sha $latest"" >> $GITHUB_ENV
    - name: Determine docker tags (from git tag)
      if: github.ref_type == 'tag'
      run: |
        git_tag=${{ github.ref_name }}
        echo DOCKER_TAGS=""$git_tag"" >> $GITHUB_ENV
    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.NVCR_USERNAME }}
        password: ${{ secrets.NVCR_TOKEN }}
    # - name: Make build and push  #TODO: once ready, uncomment
    #   run: |
    #     echo "Docker tags will be: $DOCKER_TAGS"
    #     for docker_tag in $DOCKER_TAGS; do
    #       echo make VERSION=$docker_tag image-build-multiarch image-push-multiarch
    #     done

  helm-package-publish:
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Determine versions (from git branch)
      if: github.ref_type == 'branch'
      run: |
        git_sha=$(git rev-parse --short HEAD)  # short git commit hash
        chart_current_version=$(yq '.version' deployment/network-operator/Chart.yaml)
        app_version=$git_sha
        chart_version=$chart_current_version-$git_sha
        echo APP_VERSION=""$app_version"" >> $GITHUB_ENV
        echo VERSION=""$chart_version""   >> $GITHUB_ENV
    - name: Determine versions (from git tag)
      if: github.ref_type == 'tag'
      run: |
        git_tag=${{ github.ref_name }}
        app_version=$git_tag
        chart_version=${git_tag:1}  # without the 'v' prefix
        echo APP_VERSION=""$app_version"" >> $GITHUB_ENV
        echo VERSION=""$chart_version""   >> $GITHUB_ENV
    - name: NGC authentication
      run: |
        wget --no-verbose --content-disposition https://api.ngc.nvidia.com/v2/resources/nvidia/ngc-apps/ngc_cli/versions/3.41.4/files/ngccli_linux.zip -O ngccli_linux.zip
        unzip -q ngccli_linux.zip
        echo "./ngc-cli" >> $GITHUB_PATH

        ngc-cli/ngc config set <<EOF
          ${{ secrets.NVCR_TOKEN }}
          json
          nvstaging
          mellanox
          no-ace
        EOF
    # - name: Make package and push  # TODO: once ready, uncomment
    #   run: |
    #     make chart-build chart-push
    - name: NGC logout
      run: |
        ngc config clear-cache
        ngc config clear
